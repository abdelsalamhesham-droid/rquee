<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Bow Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <div id="envelopeContainer" class="hidden">
        <div class="envelope" id="envelope">
            <div class="flap"></div>
            <div class="pocket"></div>
            <div class="letter" id="letter">
                <div class="letter-text">اكْـتـفـيتُ بـك و كـأنـك لي حياة</div>
            </div>
        </div>
        
        <div id="musicContainer" class="music-hidden">
            <a href="https://open.spotify.com/track/4M6vHSwn3CZ3tJUrVCwpma?si=B9jVcg_jQfWOu9VOXhlP-w" target="_blank" class="music-btn">اضغط هنا للمفاجأة 🎵🎁</a>
        </div>
    </div>
    
    <div id="cowAlert" class="cow-hidden">بقرة 🐮</div>

    <canvas id="gameCanvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
